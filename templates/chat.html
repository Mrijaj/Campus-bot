<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Assistant | Rajasthan DTE</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="container py-4">
    <div class="chat-container">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="text-primary fw-bold m-0">🏛️ Campus Assistant</h3>
            <button id="theme-toggle" class="btn btn-sm btn-outline-secondary" onclick="toggleTheme()">
                🌙 Dark Mode
            </button>
        </div>

        <div class="lang-pills d-flex justify-content-center gap-2 mb-3">
            <button onclick="setLanguage('English')" class="btn btn-primary btn-sm lang-btn">English</button>
            <button onclick="setLanguage('Hindi')" class="btn btn-outline-secondary btn-sm lang-btn">हिंदी</button>
            <button onclick="setLanguage('Marathi')" class="btn btn-outline-secondary btn-sm lang-btn">मराठी</button>
            <button onclick="setLanguage('Tamil')" class="btn btn-outline-secondary btn-sm lang-btn">தமிழ்</button>
        </div>

        <div id="chat-window" class="mb-3"></div>

        <div class="input-group shadow-sm">
            <input type="text" id="userQuery" class="form-control border-end-0"
                   placeholder="Type your message..." onkeypress="handleKey(event)">
            <button onclick="askBot()" class="btn btn-primary px-4 border-start-0">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.001.26.41a.5.5 0 0 0 .886-.083l6-15Zm-1.833 1.89L6.637 10.07l-.215-.338a.5.5 0 0 0-.154-.154l-.338-.215 7.494-7.494 1.178-.471-.47 1.178Z"/>
                </svg>
            </button>
        </div>

        <p class="text-center text-muted mt-3 small">Verified Information • Privacy Focused</p>
    </div>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
