<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Assistant | Premium AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header d-flex justify-content-between align-items-center">
            <div>
                <h4 class="fw-bold m-0" style="color: var(--primary-color)">🏛️ Campus Assistant</h4>
                <small class="text-muted">SIH 2025 • Verified Intelligence</small>
            </div>
            <div class="d-flex align-items-center gap-2">
                <button onclick="resetChat()" class="btn btn-sm text-danger border-0 bg-transparent fw-medium" title="Clear conversation">
                    🔄 Reset
                </button>
                <button id="theme-toggle" class="btn btn-sm btn-outline-secondary rounded-pill px-3" onclick="toggleTheme()">
                    🌙 Dark Mode
                </button>
            </div>
        </header>

        <div class="px-4 py-2 d-flex gap-2 border-bottom bg-light bg-opacity-10 overflow-auto">
            <button onclick="setLanguage('English')" class="btn btn-sm lang-btn btn-primary rounded-pill px-3">English</button>
            <button onclick="setLanguage('Hindi')" class="btn btn-sm lang-btn btn-outline-secondary rounded-pill px-3">हिंदी</button>
            <button onclick="setLanguage('Marathi')" class="btn btn-sm lang-btn btn-outline-secondary rounded-pill px-3">मराठी</button>
            <button onclick="setLanguage('Tamil')" class="btn btn-sm lang-btn btn-outline-secondary rounded-pill px-3">தமிழ்</button>
        </div>

        <div id="chat-window"></div>

        <footer class="input-area">
            <div class="input-pill">
                <input type="text" id="userQuery" class="form-control border-0 bg-transparent"
                       placeholder="Ask about fees, scholarships, or help..." onkeypress="handleKey(event)">
                <button onclick="askBot()" class="send-btn ms-2 shadow-sm">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576 6.636 10.07Zm6.787-8.201L1.591 6.602l4.339 2.76 7.494-7.493Z"/>
                    </svg>
                </button>
            </div>
            <p class="text-center text-muted mt-3 mb-0 x-small" style="font-size: 0.75rem;">Verified Information • Data Secured</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
